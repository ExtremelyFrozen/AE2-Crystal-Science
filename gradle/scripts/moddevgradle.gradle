neoForge {
    // Specify Forge version
    version = libs.versions.neoForge.get()

    parchment {
        minecraftVersion = libs.versions.minecraft.get()
        mappingsVersion = libs.versions.parchment.get()
    }

//    // This line is optional. Access Transformers are automatically detected
//    accessTransformers {
//        var file = project.file('src/main/resources/META-INF/accesstransformer.cfg')
//        from(file)
//        publish(file)
//    }

    addModdingDependenciesTo(sourceSets.test)
    addModdingDependenciesTo(sourceSets.extra)

    mods {
        // define mod <-> source bindings
        "${mod_id}" {
            sourceSet(sourceSets.main)
            sourceSet(sourceSets.client)
            sourceSet(sourceSets.test)
            sourceSet(sourceSets.extra)
            sourceSet(sourceSets.clientExtra)
        }
    }


    runs {
        client {
            client()
            sourceSet = sourceSets.clientExtra
            ideName = "All Client"

            gameDirectory.set(file('run/all/client'))
            systemProperty('neoforge.enabledGameTestNamespaces', project.mod_id)
        }

        server {
            server()
            sourceSet = sourceSets.extra
            ideName = "All Server"

            gameDirectory.set(file('run/all/server'))
            programArguments.addAll('--nogui', '--world', 'world-extra')
            systemProperty('neoforge.enabledGameTestNamespaces', project.mod_id)
        }

        loginClient {
            client()
            sourceSet = sourceSets.clientExtra
            ideName = "All Client (Dev Login)"
            devLogin = true

            gameDirectory.set(file('run/login/client'))
            systemProperty('neoforge.enabledGameTestNamespaces', project.mod_id)
        }

        loginserver {
            server()
            sourceSet = sourceSets.extra
            ideName = "All Server (Dev Login)"

            gameDirectory.set(file('run/login/server'))
            programArguments.addAll('--nogui', '--world', 'world-extra')
            systemProperty('neoforge.enabledGameTestNamespaces', project.mod_id)
        }

        // Client with GTM + Jade, EMI, AE2
        cleanClient {
            client()
            sourceSet = sourceSets.client
            ideName = "Clean Client"

            gameDirectory.set(file('run/clean/client'))
            systemProperty('neoforge.enabledGameTestNamespaces', project.mod_id)
        }

        cleanServer {
            server()
            sourceSet = sourceSets.main
            ideName = "Clean Server"

            gameDirectory.set(file('run/clean/server'))
            programArgument '--nogui'
            systemProperty('neoforge.enabledGameTestNamespaces', project.mod_id)
        }

        // This run config launches GameTestServer and runs all registered gametests, then exits.
        // By default, the server will crash when no gametests are provided.
        // The gametest system is also enabled by default for other run configs under the /test command.
        gameTestServer {
            type = "gameTestServer"
            sourceSet = sourceSets.test
            ideName = "Game Tests"

            gameDirectory.set(file('run/gametest/server'))
            systemProperty('neoforge.enabledGameTestNamespaces', project.mod_id)
            environment('TEST', 'true')
        }

        gameTestClient {
            client()
            sourceSet = sourceSets.test
            ideName = "Game Tests (Client)"

            gameDirectory.set(file('run/gametest/client'))
            systemProperty('neoforge.enabledGameTestNamespaces', project.mod_id)
            environment('TEST', 'true')
        }

        data {
            data()
            sourceSet = sourceSets.main
            ideName = "Data Generation"

            gameDirectory.set(file('run/data'))
            // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
            programArguments.addAll('--mod', project.mod_id)
            programArguments.addAll('--all')
            programArguments.addAll('--output', file('src/generated/resources/').getAbsolutePath())
            programArguments.addAll('--existing', file('src/main/resources/').getAbsolutePath())
        }

        configureEach {
            systemProperty 'forge.logging.markers', 'REGISTRIES'
            jvmArgument('-ea:io.github.lounode.ae2cs...')
            logLevel = org.slf4j.event.Level.INFO
        }
    }
}

idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
